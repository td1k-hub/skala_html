<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 게임 센터와 동일한 오버레이 스타일 */
        .game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .overlay-content { background: white; color: black; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .trip-card { cursor: pointer; display: inline-block; margin: 10px; }
    </style>
</head>
<body>
    <div class="side-menu-wrapper" id="sideMenu">
        <button class="tab-trigger" onclick="toggleSideMenu()">▶</button>
        <ul class="menu-list">
            <li><a href="index.html">홈</a></li>
            <li><a href="myClass.html">수업</a></li>
            <li><a href="myHoliday.html">휴일</a></li>
            <li><a href="myProfile.html">프로필</a></li>
            <li><a href="myTrip.html">앨범</a></li>
            <li><a href="SignUp.html">회원가입</a></li>
        </ul>
    </div>

    <div class="container">
        <a href="index.html" class="btn-home">🏠 홈으로</a>
        <h1>🌎나의 여행 앨범🎵</h1>
        <audio controls autoplay>
            <source src="" type="audio/ogg">
            <source src="" type="audio/mpeg">
        </audio>

        <div class="album-info">
            <p>사진을 누르시면 여행지의 설명을 보실 수 있습니다 📸 </p> 
        </div>

        <div class="trip-grid-container">
            <!-- 클릭 시 showTripInfo 함수 호출 -->
            <p class="trip-card" onclick="showTripInfo('여수 하늘', '여수에서 바라본 하늘입니다. 오른쪽으로는 오동도가 보이고 왼쪽으로는 남해가 보이는 전망이 좋은 사진입니다.')">
                <img src="../media/picture/myhome.jpg" alt="여수 하늘" width="400" height="200"> <br>여수 하늘 (2026)
            </p>
            <p class="trip-card" onclick="showTripInfo('대만 백화점', '2026년 대만 여행 중 방문한 쇼핑몰입니다. 다양한 브랜드와 음식점이 있어 여행객들에게 인기 있는 장소입니다.')">
                <img src="../media/picture/taiwan.jpg" alt="대만 백화점" width="400" height="200"> <br> 대만 백화점 (2026)
            </p>
            <p class="trip-card" onclick="showTripInfo('대만 길거리', '2026년 대만의 길거리 풍경입니다. 사진 명소로 많은 사람들의 발걸음이 멈추는 곳 입니다.')">
                <img src="../media/picture/taiwan3.png" alt="대만 길거리" width="400" height="200"><br> 대만 길거리 (2026)
            </p>
        </div>
        <hr>

        <h2>나의 여행 브이로그</h2>
        <video width="225" height="400" controls>
            <source src="../media/video/everland.mp4" type="video/mp4"> 
        </video>
        <br> 비 오는 날의 에버랜드(2022)
    </div>

    <!-- 오버레이 팝업창 (게임 센터와 동일 구조) -->
    <div id="game-overlay" class="game-overlay">
        <div class="overlay-content">
            <h2 id="game-title">설명</h2>
            <div id="game-area"></div>
            <br>
            <button class="btn-submit" onclick="stopGame()">닫기 🛑</button>
        </div>
    </div>

    <script>
        // 오버레이 제어 함수 (게임 센터의 함수들과 동일하게 작동)
        function showTripInfo(title, desc) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('game-title').innerText = title;
            document.getElementById('game-area').innerHTML = `<p style="padding:10px;">${desc}</p>`;
        }

        function stopGame() {
            document.getElementById('game-overlay').style.display = 'none';
        }
    </script>
    <button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()">⏏︎</button>
    <script src="../script/scroll.js"></script>
    <script src="script/toggle.js"></script>
</body>
</html>
