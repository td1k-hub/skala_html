<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .scroll-top-btn {
            position: fixed; bottom: 30px; right: 30px; font-size: 20px;
            background-color: #ffffff; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 50%; width: 50px; height: 50px; cursor: pointer;
            display: none; z-index: 2000; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .scroll-top-btn:hover { background-color: #f8f8f8; transform: translateY(-5px); }
    </style>
</head>
<body>
<div class="side-menu-wrapper" id="sideMenu">
    <button class="tab-trigger" onclick="toggleSideMenu()">▶</button>
    <ul class="menu-list">
        <li><a href="index.html">홈</a></li>
        <li><a href="myClass.html">수업</a></li>
        <li><a href="myHoliday.html">휴일</a></li>
        <li><a href="myProfile.html">프로필</a></li>
        <li><a href="myTrip.html">앨범</a></li>
        <li><a href="SignUp.html">회원가입</a></li>
    </ul>
</div>
    <div class="container">
    <a href="index.html" class="btn-home">🏠 홈으로</a>
    <h1>회  원  가  입</h1>
    <p style="margin-left: 20px;">회원가입을 환영합니다</p>
    <form action="signUpResult.html" method="GET">
        <fieldset>
            <legend>계정 정보</legend>
            <p> 
                <label for="userId">* 아이디: </label>
                <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15 영문/숫자">
            </p>
            <p>
                <label for="userPW">* 비밀번호: </label>
                <input type="password" id="userPW" name="userPw" minlength="8" required placeholder="8자 이상 입력">
            </p>
            <p>
                <label for="userEmail">이메일: </label>
                <input type="text" id="userEmail" name="userEmail" placeholder="example">
                @
                <select name="emailDomain">
                    <option value="direct">직접 입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                </select>
            </p>
            <small>(*는 필수사항입니다.)</small>
        </fieldset>

        <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
                <label for="userName">이름: </label>
                <input type="text" id="userName" name="userName" required>
            </p>
            <p>
                <label for="userBirth">생년월일: </label>
                <input type="date" id="userBirth" name="userBirth">
            </p>
            <p>
                <label><input type="radio" name="gender" value="male" checked> 남성 </label>
                <label><input type="radio" name="gender" value="female" > 여성 </label>
                <label><input type="radio" name="gender" value="none" > 선택안함 </label>
            </p>
            <p>
                관심분야 (중복 선택 가능): <br>
                <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                <label><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label><br>
            </p>
             <p>
                <label for="joinPath">가입 경로: </label>
                <select id="joinPath" name="joinPath">
                    <option value="" disabled selected>-- 선택해 주세요 --</option>
                    <option value="search">인터넷 검색</option>
                    <option value="friend">지인 추천</option>
                    <option value="sns">SNS 광고</option>
                    <option value="etc">기타</option>
                </select>
            </p>
        </fieldset>
        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사: </label><br>
                <textarea id="intro" name="intro" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </p>
        </fieldset>
        <input type="submit" class="btn-submit" value="회원가입 완료">
        <input type="reset" class="btn-reset" value="다시 작성">
    </form>

    <button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()">⏏︎</button>
    
    <script src="../script/scroll.js"></script>
    <script src="script/toggle.js"></script>  
</body>
</html>
